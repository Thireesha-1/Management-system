<h2>Employees</h2>

<form method="GET">
<input name="search" placeholder="Search">
<button>Search</button>
</form>

<form method="POST" action="/add_employee">
<input name="name" placeholder="Name">
<input name="role" placeholder="Role">
<input name="salary" placeholder="Salary">
<button>Add</button>
</form>

<table border="1">
{% for e in employees %}
<tr>
<td>{{e.id}}</td>
<td>{{e.name}}</td>
<td>{{e.role}}</td>
<td>{{e.salary}}</td>
<td>
<a href="/edit_employee/{{e.id}}">Edit</a>
<a href="/delete_employee/{{e.id}}">Delete</a>
</td>
</tr>
{% endfor %}
</table>
